<!DOCTYPE html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>TrilhaVerde - Loja</title>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
		<link rel="stylesheet" href="styles.css">
	</head>
	<body>

		<header>
			<nav class="navbar navbar-expand-md navbar-dark sticky-top px-3 px-md-4 py-2 bg-verde">
				<a class="navbar-brand fw-bold fs-5" href="#">🌿 TrilhaVerde</a>
				<button class="navbar-toggler" type="button"
					data-bs-toggle="collapse" data-bs-target="#menuNav"
					aria-controls="menuNav" aria-expanded="false"
					aria-label="Abrir menu">
					<span class="navbar-toggler-icon"></span>
				</button>

				<div class="collapse navbar-collapse justify-content-end" id="menuNav">
					<ul class="navbar-nav gap-1 mt-2 mt-md-0">
						<li class="nav-item">
							<a class="nav-link link-nav px-3" href="#">Início</a>
						</li>
						<li class="nav-item">
							<a class="nav-link link-nav px-3" href="#">Parques</a>
						</li>
						<li class="nav-item">
							<a class="nav-link link-nav px-3" href="#">Trilhas</a>
						</li>
						<li class="nav-item">
							<a class="nav-link link-nav px-3" href="#">Loja</a>
						</li>
					</ul>
				</div>
			</nav>
		</header>

		<main>

			<section class="bg-white py-4 py-md-5">
				<div class="container">
					<h2 class="mb-4 titulo-verde text-center">Loja TrilhaVerde</h2>

					<div class="d-flex flex-column flex-sm-row justify-content-center align-items-center gap-3 flex-wrap">
						<input id="search" type="text" class="form-control campo-busca" placeholder="Buscar produto...">
						<select id="category" class="form-select campo-busca"></select>
						<button id="btnRender" class="btn-verde px-4 py-2">Renderizar</button>
					</div>
				</div>
			</section>

			<section class="py-4 py-md-5">
				<div class="container">
					<div id="product-list" class="row g-4"></div>
				</div>
			</section>

			<section class="py-4">
				<div class="container">
					<div id="product-details"></div>
				</div>
			</section>

		</main>

		<footer class="bg-verde-escuro text-center py-4 py-md-5">
			<p class="fw-bold text-white mb-3 fs-5">🌿 TrilhaVerde</p>

			<div class="d-flex flex-wrap justify-content-center gap-3 mb-3">
				<a href="#" class="link-rodape">Instagram</a>
				<a href="#" class="link-rodape">Facebook</a>
				<a href="#" class="link-rodape">YouTube</a>
				<a href="#" class="link-rodape">Sobre nós</a>
			</div>

			<p class="text-verde-claro small mb-0">
				© 2024 TrilhaVerde. Todos os direitos reservados.
			</p>
		</footer>

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
		<script src="script.js"></script>
	</body>
</html>
